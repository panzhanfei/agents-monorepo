pipeline:
  fullTestCommand: pnpm run test && pnpm run e2e
  publishCommand: pnpm run build
review:
  activeProfile: default
  profiles:
    default:
      aiRulesGlob: .cursor/rules/**/*.mdc
      customerRulesDir: ./config/review-custom
      blockingCommands:
        - pnpm run lint
        - pnpm run check-types
    strict:
      aiRulesGlob: .cursor/rules/**/*.mdc
      customerRulesDir: ./config/review-custom-strict
      blockingCommands:
        - pnpm run lint
        - pnpm run check-types
        - pnpm run knip
  extraConfigFiles:
    - agents.config.yaml
    - knip.json
    - turbo.json
target:
  source: git
  gitRepoUrl: ""
  defaultBranch: main
  workspacePath: ./workspace/target-repo
feishu:
  enabled: false
  confirmBetweenPipelineSteps: false
  parseWorkspacePathFromMessage: true
  parseGitRemoteUrlFromMessage: true
agents:
  orchestrator:
    port: 4010
  coding-agent:
    port: 4020
  review-agent:
    port: 4030
  test-agent:
    port: 4041
  ops-agent:
    port: 4050
  requirements-agent:
    port: 4060
packaging:
  buildOutputDir: ""
  artifactLocalDir: ./artifacts/release
  stagingDir: ./artifacts/staging
server:
  sshHost: ""
  sshUser: ""
  sshPort: 22
  remoteDeployPath: ""
  backup:
    enabled: true
    remoteParentDir: /srv/backups/your-app
    keepRevisions: 5
    abortPublishIfBackupFails: true
  rollback:
    scriptName: rollback.sh
    requireFeishuConfirm: true
  probe:
    listenPorts:
      - 80
      - 443
      - 3000
      - 4000
    runSsListenTcp: true
    runHostInfo: true
    systemdUnits: []
    dockerPs: false
generatedOps:
  scriptsDir: .agents/generated
  manifestPath: .agents/generated/manifest.json
  enforceManifestFingerprint: false
llm:
  provider: local
  baseUrl: http://127.0.0.1:11434/v1
  model: ""
  timeoutMs: 120000
security:
  verificationCode:
    enabled: true
    staticCode: ""
    requiredForActions:
      - publish
      - full_release
      - rollback
      - change_review_rules
      - change_deploy_target
      - change_workspace_binding
      - git_remote_override

