# 本地开发：PostgreSQL + Redis（API 与 BullMQ Worker）
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: agents
      POSTGRES_DB: agents_dev
    ports:
      - "5432:5432"
    volumes:
      - agents_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - agents_redis:/data

volumes:
  agents_pg:
  agents_redis:
